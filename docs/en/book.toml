[book]
title = "Malkuth Documentation"
description = "A generic Rust toolkit for service supervision: graceful shutdown, health probes, worker supervision, socket activation, and coordination locks"
authors = ["celestia-island"]
language = "en"
src = "."

[build]
build-dir = "../../target/docs/en"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/malkuth"
edit-url-template = "https://github.com/celestia-island/malkuth/edit/dev/docs/en/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
