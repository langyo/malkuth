[book]
title = "وثائق Malkuth"
description = "حقيبة أدوات Rust عامة للإشراف على الخدمات: الإيقاف السلس، فحوصات الصحة، الإشراف على العمال، تنشيط المقابس، وأقفال التنسيق"
authors = ["celestia-island"]
language = "ar"
src = "."

[build]
build-dir = "../../target/docs/ar"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/malkuth"
edit-url-template = "https://github.com/celestia-island/malkuth/edit/dev/docs/ar/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
