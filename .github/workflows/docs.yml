name: Deploy Documentation

on:
  push:
    branches: [master, dev]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Render the multilingual docs tree with Lagrange (replaces mdBook).
      # The composite action checks celestia-island/lagrange out alongside
      # this repo and runs `lagrange build --src docs --out _site`.
      - uses: celestia-island/lagrange/.github/actions/build@dev
        with:
          src: docs
          out: _site

      - run: echo "malkuth.docs.celestia.world" > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
