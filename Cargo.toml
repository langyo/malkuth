[workspace]
resolver = "2"
members = ["crates/malkuth-core", "crates/malkuth", "crates/malkuth-cli"]

[workspace.package]
version = "0.2.0"
edition = "2024"
rust-version = "1.85"
authors = ["langyo <langyo.china@gmail.com>"]
license-file = "LICENSE"
repository = "https://github.com/celestia-island/malkuth"

[workspace.dependencies]
# ── shared across workspace members ────────────────────────────
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = { version = "1", features = ["derive"] }
thiserror = "2"
async-trait = "0.1"
tracing = "0.1"

# runtime-agnostic async I/O family (works under tokio / async-std / smol)
futures-io = "0.3"
futures-util = "0.3"
futures-core = "0.3"
event-listener = "5"
async-net = "2"
async-process = "2"
async-signal = "0.2"

# jsonrpc transports
async-tungstenite = "0.34"
interprocess = "2"

# CLI
clap = { version = "4", features = ["derive"] }
notify = "8"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "net", "signal", "sync", "time", "process", "io-util", "fs"] }
tokio-util = { version = "0.7", features = ["compat", "io"] }

libc = "0.2"

# internal crates
malkuth-core = { path = "crates/malkuth-core", version = "0.2.0" }

[profile.release]
opt-level = 3
lto = "thin"
